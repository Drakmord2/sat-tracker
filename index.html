<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- English SEO Meta Tags -->
        <meta name="description" lang="en"
            content="🛰ORBIT - Professional satellite pass prediction and real-time tracking website. Search global satellites, calculate future pass times, elevation and azimuth angles, with real-time pointing assistance. Bilingual support, offline SSTV decode, perfectly adapted for mobile device sensors.">
        <meta name="keywords" lang="en"
            content="satellite tracking,satellite pass prediction,real-time satellite positioning,satellite azimuth,satellite elevation,amateur radio,HAM radio,satellite communication,ISS tracking,satellite orbit,TLE data,mobile satellite tracking,PWA satellite app,offline satellite calculation,SSTV Decoder, Slow Scan Television, Robot36, Scottie1, Martin1, ham radio, audio to image, amateur radio SSTV, browser-based SSTV decoder">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">

        <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
        <link href="/src/css/index.css" rel="stylesheet">
        <title>🛰ORBIT</title>
    </head>
    <body>
        <h1><img src='assets/KE2HPP.png' alt="KE2HPP" width="200" height="200"></h1>

        <div class="lang-toggle">
            <a href="#" id="howToUseLink" target="_blank" class="link">HOW TO USE</a>|<a href="/src/sstv-decoder/">SSTV
                DECODE</a>
        </div>

        <div class="search-container">
            <div class="custom-dropdown">
                <input type="text" id="searchInput" placeholder="Select satellite" />
                <div class="dropdown-list" id="satelliteDropdown"></div>
            </div>

            <button id="starButton" class="star-button"
                style="display:none; border: none; background: transparent; font-size: 17px; padding: 0; width: auto; height: auto; text-align: center;">
                ⚪
            </button>
        </div>

        <div class="config-container">
            <div class="days-filter">
                <label for="days" id="daysLabel"></label>
                <select id="days">
                    <option value="1">1</option>
                    <option value="3" selected>3</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>

                </select>
            </div>

            <div class="elevation-filter">
                <label for="elevationThreshold" id="elevationThresholdLabel"></label>
                <select id="elevationThreshold">
                    <option value="0">0°</option>
                    <option value="10">10°</option>
                    <option value="15" selected>15°</option>
                    <option value="20">20°</option>
                    <option value="25">25°</option>
                    <option value="30">30°</option>
                    <option value="35">35°</option>
                    <option value="40">40°</option>
                    <option value="45">45°</option>
                </select>
            </div>

            <div class="checkbox-container">
                <label for="timeFilter" id="timeFilterLabel"></label>
                <input type="checkbox" id="timeFilter">
            </div>
        </div>

        <div class="button-container">
            <button id="calculatePassfavorite" class="button">Show favorite</button>
            <button id="calculatePass" class="button">Show selected</button>
        </div>
        <div id="addressinfo" style="font-weight: bold;  font-size: 11px;"></div>
        <div id="notesInfo" style="font-weight: bold; padding-bottom: 10px; font-size: 11px;"></div>
        <div id="passInfo" style=" width: 100%; text-align: center;"></div>
        <div id="made">
            <div>Modded by KE2HPP</div>
        </div>

        <script src="/src/vendor/satellite.js"></script>
        <script src="/src/vendor/suncalc.min.js"></script>
        <script src="/src/vendor/require.js"></script>
        <script src="/src/vendor/lightstreamer.min.js"></script>
        <script src="/src/js/index.js"></script>
    </body>
</html>
